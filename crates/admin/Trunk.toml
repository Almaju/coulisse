# Trunk configuration for the Coulisse admin UI.
#
# - In release builds, assets are hashed and referenced from `/admin/` so the
#   server can embed `dist/` and mount it there in one go.
# - In dev (`trunk serve`), requests to `/admin/api/*` are proxied to the
#   running Coulisse server on :8421 so the UI talks to real data.

[build]
public_url = "/admin/"
filehash = true

[serve]
port = 4422
addresses = ["127.0.0.1"]

[[proxy]]
backend = "http://127.0.0.1:8421/admin/api/"
rewrite = "/admin/api/"
