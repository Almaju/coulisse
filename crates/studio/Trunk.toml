# Trunk configuration for the Coulisse studio UI.
#
# - In release builds, assets are hashed and referenced from `/studio/` so the
#   server can embed `dist/` and mount it there in one go.
# - In dev (`trunk serve`), requests to `/studio/api/*` are proxied to the
#   running Coulisse server on :8421 so the UI talks to real data.

[build]
public_url = "/studio/"
filehash = true

[serve]
port = 4422
addresses = ["127.0.0.1"]

[[proxy]]
backend = "http://127.0.0.1:8421/studio/api/"
rewrite = "/studio/api/"
