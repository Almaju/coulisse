<div class="mt-2 rounded-md border border-emerald-900/60 bg-emerald-950/40 px-4 py-3">
  <p class="text-sm font-medium text-emerald-200">Token created for <span class="font-mono">{{ label }}</span></p>
  <p class="mt-1 text-xs text-emerald-400/80">Copy it now — this is the only time the secret is shown.</p>
  <div class="mt-2 flex items-center gap-2">
    <code class="flex-1 select-all break-all rounded bg-slate-950 px-3 py-2 font-mono text-sm text-slate-100">{{ secret }}</code>
    <button
      type="button"
      class="rounded-md border border-slate-700 bg-slate-800 px-3 py-2 text-xs text-slate-200 hover:bg-slate-700"
      onclick="navigator.clipboard.writeText('{{ secret }}')"
    >Copy</button>
  </div>
  <p class="mt-3 text-xs text-slate-400">
    <a href="/admin/tokens" class="text-emerald-300 hover:underline" hx-get="/admin/tokens" hx-target="#main" hx-push-url="true">Refresh the list →</a>
  </p>
</div>
