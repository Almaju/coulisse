name: Dependabot auto-merge

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - id: metadata
        uses: dependabot/fetch-metadata@v2

      # Only patch updates auto-merge. Cargo treats `0.x.y → 0.x.z` as a patch
      # but `0.x → 0.y` (which dependabot calls "minor") as breaking, so a
      # blanket "minor" allowance auto-merges incompatible changes for the
      # large pre-1.0 corner of the ecosystem. Minor bumps stay open for
      # manual review.
      - if: steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
