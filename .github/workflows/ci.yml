name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-machete
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete

      - name: Install cargo-sort-derives
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-sort-derives

      - name: Install cargo-dylint + dylint-link
        run: cargo install cargo-dylint dylint-link --locked

      - name: Install cargo-oneway
        run: cargo install cargo-oneway --git https://github.com/Almaju/oneway

      - name: cargo oneway (fmt --check + clippy + oneway-lints)
        run: cargo oneway

      - name: cargo sort-derives --check
        run: cargo sort-derives --check

      - name: cargo machete
        run: cargo machete --with-metadata

      - name: cargo test
        run: cargo test --all --locked
