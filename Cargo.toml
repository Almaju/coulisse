[workspace]
resolver = "3"
members = [
    "crates/agents",
    "crates/backends",
    "crates/cli",
    "crates/core",
    "crates/experiments",
    "crates/judge",
    "crates/limits",
    "crates/memory",
    "crates/proxy",
    "crates/studio",
    "crates/telemetry",
]

[workspace.package]
description = "OpenAI-compatible server with memory, tools, and multi-backend routing — configured with one YAML file."
edition = "2024"
license = "MIT"
repository = "https://github.com/Almaju/coulisse"
version = "0.1.0"

[workspace.dependencies]
agents = { path = "crates/agents" }
async-stream = "0.3"
axum = "0.8"
backends = { path = "crates/backends" }
coulisse-core = { path = "crates/core" }
experiments = { path = "crates/experiments" }
futures = "0.3"
judge = { path = "crates/judge" }
limits = { path = "crates/limits" }
memory = { path = "crates/memory" }
oxilangtag = "0.1"
proxy = { path = "crates/proxy" }
rig-core = { version = "0.35", features = ["rmcp"] }
rmcp = { version = "1", features = [
    "client",
    "reqwest",
    "transport-child-process",
    "transport-streamable-http-client",
    "transport-streamable-http-client-reqwest",
] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
sqlx = { version = "0.8", default-features = false, features = ["macros", "runtime-tokio", "sqlite"] }
studio = { path = "crates/studio" }
telemetry = { path = "crates/telemetry" }
thiserror = "2"
tokio = "1"
tracing = "0.1"
uuid = { version = "1", features = ["v4", "v5"] }

# The profile that 'dist' will build with
[profile.dist]
inherits = "release"
lto = "thin"
