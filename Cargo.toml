[workspace]
resolver = "3"
members = [
    "crates/cli",
    "crates/config",
    "crates/judge",
    "crates/limits",
    "crates/memory",
    "crates/prompter",
    "crates/proxy",
    "crates/telemetry",
]
# `crates/studio` is currently the legacy Leptos WASM app, kept out of the
# workspace so `cargo build`/`cargo test` don't try to cross-compile it.
# Step 2 of the studio refactor replaces it with an Axum + htmx crate that
# joins the workspace.
exclude = ["crates/studio"]

[workspace.package]
description = "OpenAI-compatible server with memory, tools, and multi-backend routing — configured with one YAML file."
edition = "2024"
license = "MIT"
repository = "https://github.com/Almaju/coulisse"
version = "0.1.0"

[workspace.dependencies]
async-stream = "0.3"
axum = "0.8"
config = { path = "crates/config" }
futures = "0.3"
judge = { path = "crates/judge" }
limits = { path = "crates/limits" }
memory = { path = "crates/memory" }
oxilangtag = "0.1"
prompter = { path = "crates/prompter" }
proxy = { path = "crates/proxy" }
rig-core = { version = "0.35", features = ["rmcp"] }
rmcp = { version = "1", features = [
    "client",
    "reqwest",
    "transport-child-process",
    "transport-streamable-http-client",
    "transport-streamable-http-client-reqwest",
] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
sqlx = { version = "0.8", default-features = false, features = ["macros", "runtime-tokio", "sqlite"] }
telemetry = { path = "crates/telemetry" }
thiserror = "2"
tokio = "1"
tracing = "0.1"
uuid = { version = "1", features = ["v4", "v5"] }

# The profile that 'dist' will build with
[profile.dist]
inherits = "release"
lto = "thin"
