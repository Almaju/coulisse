[workspace]
resolver = "3"
members = ["crates/cli", "crates/limits", "crates/memory", "crates/prompter", "crates/server"]
# `crates/admin` is a Leptos WASM app with its own lockfile. Kept out of the
# workspace so `cargo test`/`cargo clippy` don't try to cross-compile it.
exclude = ["crates/admin"]

[workspace.package]
description = "OpenAI-compatible server with memory, tools, and multi-backend routing — configured with one YAML file."
edition = "2024"
license = "MIT"
repository = "https://github.com/Almaju/coulisse"
version = "0.1.0"

[workspace.dependencies]
async-stream = "0.3"
axum = "0.8"
futures = "0.3"
limits = { path = "crates/limits" }
memory = { path = "crates/memory" }
oxilangtag = "0.1"
prompter = { path = "crates/prompter" }
rig-core = { version = "0.35", features = ["rmcp"] }
rmcp = { version = "1", features = [
    "client",
    "reqwest",
    "transport-child-process",
    "transport-streamable-http-client",
    "transport-streamable-http-client-reqwest",
] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
server = { path = "crates/server" }
sqlx = { version = "0.8", default-features = false, features = ["macros", "runtime-tokio", "sqlite"] }
thiserror = "2"
tokio = "1"
tracing = "0.1"
uuid = { version = "1", features = ["v4", "v5"] }

# The profile that 'dist' will build with
[profile.dist]
inherits = "release"
lto = "thin"
