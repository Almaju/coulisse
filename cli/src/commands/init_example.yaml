# Supported providers: anthropic, cohere, deepseek, gemini, groq, openai
# Add IDE validation: coulisse schema > coulisse.schema.json
# yaml-language-server: $schema=./coulisse.schema.json

# Fallback user identifier for requests that don't supply `safety_identifier`
# (or the deprecated `user` field). Leave unset for multi-tenant deployments
# so every request must identify its user. Set to a value like "main" for
# local / single-user setups: memory still works, just scoped to that bucket.
# default_user_id: main

# HTTP server wiring. Optional — omit for 0.0.0.0:8421 with a CPU-sized
# thread pool and axum's default body limit. (The port lives here now, not
# at the top level.)
# server:
#   bind: 0.0.0.0
#   port: 8421
#   worker_threads: 4
#   max_body_bytes: 8388608   # 8 MiB

# Authentication for the /v1/* proxy and the /admin/* studio. Each scope is
# optional; omit one to leave that surface open (fine for loopback, never for
# anything exposed). See docs/src/reference/yaml.md#auth.
# auth:
#   proxy:
#     # Self-issued API tokens: clients send `Authorization: Bearer sk-coulisse-…`.
#     # Mint them with `coulisse token create <label> --principal <user>` or in
#     # the studio at /admin/tokens, where you also set per-token budgets and
#     # watch spend. The empty map is the on switch.
#     tokens: {}
#   admin:
#     basic:
#       username: admin
#       password: ${ADMIN_PASSWORD}

# Memory subsystem. The whole block is optional — omit it for the default:
# conversation history only, no long-term memory. Add `user_state: true` to
# also remember durable facts about each user across conversations. The
# database always lives at .coulisse/coulisse-memory.db next to this file —
# there is no path knob. See docs/src/configuration/memory.md.
memory:
  user_state: true

providers:
  anthropic:
    api_key: sk-ant-your-key-here
  openai:
    api_key: sk-your-openai-key
  gemini:
    api_key: your-gemini-key

# Optional: MCP (Model Context Protocol) servers the agents can borrow
# tools from. Coulisse infers everything from the shape of the entry:
#   - `url:`     → remote HTTP/SSE (sse picked when the path has /sse).
#   - `command:` → local stdio child process.
# URL-based servers default to `oauth: discover` automatically — same
# zero-config UX as ChatGPT. Opt out of OAuth with `oauth: false` for the
# rare non-auth HTTP MCP.
mcp:
  # Local stdio MCP — Coulisse spawns the command, talks over stdin/stdout.
  hello:
    command: uvx
    args:
      - --from
      - "git+ssh://git@github.com/macsymwang/hello-mcp-server.git"
      - hello-mcp-server

  # Remote MCP with per-user OAuth. Paste the URL, done.
  # todoist:
  #   url: https://ai.todoist.net/mcp

  # Plain HTTP MCP without auth — explicit opt-out.
  # calculator:
  #   url: http://localhost:8080
  #   oauth: false

# LLM-as-judge evaluators. Optional — omit the block for no evaluation.
# Each judge runs in a background task after an assistant turn. Agents opt
# in by listing judge names in their own `judges:` field. Coulisse forces
# the output shape (integer 0-10 per criterion + reasoning) internally, so
# rubrics only describe *what* to assess — never scale or format.
# See docs/src/features/evaluation.md for the full walkthrough.
judges:
  # Cheap, broad check on every assistant turn. A small model averaged
  # across many turns gives a stable signal at negligible cost.
  - name: quality
    provider: openai
    model: gpt-4o-mini
    sampling_rate: 1.0
    rubrics:
      accuracy:    Factual accuracy. Flag hallucinations.
      helpfulness: Whether the assistant answered the user's question.
      tone:        Politeness and tone.

  # Expensive deep audit on a small fraction of turns for code reviews.
  # A strong model gives a more discerning read; sampling keeps the bill down.
  - name: review_depth
    provider: anthropic
    model: claude-sonnet-4-5-20250929
    sampling_rate: 0.1
    rubrics:
      correctness: Did the reviewer catch real bugs, not just cosmetic issues?
      clarity:     Are the suggested fixes concrete and actionable?

agents:
  - name: claude-assistant
    provider: anthropic
    model: claude-sonnet-4-5-20250929
    preamble: You are a helpful general-purpose assistant.
    judges: [quality]
    # Grant this agent every tool exposed by the `hello` MCP server.
    mcp_tools:
      - server: hello

  - name: gpt-assistant
    provider: openai
    model: gpt-4o
    preamble: You are a helpful general-purpose assistant.
    judges: [quality]
    # Restrict this agent to a specific subset of tools (tool names come
    # from the MCP server — startup logs the tools it discovered).
    mcp_tools:
      - server: hello
        only:
          - say_hello

  - name: gemini-assistant
    provider: gemini
    model: gemini-2.0-flash
    preamble: You are a helpful general-purpose assistant.
    judges: [quality]

  - name: code-reviewer
    provider: anthropic
    model: claude-sonnet-4-5-20250929
    preamble: |
      You are a thorough code reviewer. Focus on correctness, clarity, and security.
      Point out subtle bugs and suggest concrete improvements.
    # Stack judges: broad quality check on every turn + deep audit on 10%.
    judges: [quality, review_depth]

# --- Smoke tests ------------------------------------------------------
#
# Synthetic-user evaluation runs. A persona LLM role-plays a user and
# drives a real conversation against the target agent (or experiment).
# Every assistant turn flows through the same judge pipeline as
# production, so you get a transcript and scores back without writing
# any harness code. Trigger from the studio at /admin/smoke/<name>.

# smoke_tests:
#   - name: helpfulness_check
#     # Agent or experiment name. Resolved per run, so targeting an
#     # experiment naturally samples its variants across repetitions.
#     target: assistant
#     persona:
#       provider: openai
#       model: gpt-4o-mini
#       preamble: |
#         You are role-playing a user with a vague but reasonable question
#         about Rust async. Reply like a real human and finish with [FIN]
#         once the assistant has answered to your satisfaction.
#     # Optional opening line — omit to let the persona open the chat.
#     initial_message: "Hi, I have a question about async Rust."
#     stop_marker: "[FIN]"
#     max_turns: 8
#     repetitions: 3

# --- Telemetry --------------------------------------------------------
#
# Observability wiring for the running server. The fmt and SQLite layers
# are on by default; OTLP is opt-in for plugging coulisse into your own
# observability backend (Grafana, SigNoz, Jaeger, Honeycomb, ...).
#
# All three are composable: turn the SQLite layer off if you don't need
# the studio UI, or run SQLite + OTLP together to get both an offline
# audit trail and live traces.

# telemetry:
#   fmt:
#     enabled: true        # stderr logs; defaults to on
#   sqlite:
#     enabled: true        # mirrors `turn` / `tool_call` spans into the studio's tables
#   otlp:
#     endpoint: "http://localhost:4317"
#     protocol: grpc       # or http_binary (port 4318)
#     service_name: coulisse
#     headers:
#       authorization: "Bearer ${OTEL_API_KEY}"
