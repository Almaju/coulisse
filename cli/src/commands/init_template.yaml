# Coulisse — minimal starter config.
#
# This template gets the server running with a single OpenAI agent and
# local sqlite memory. Drop in your API key and run `coulisse start`.
# Run `coulisse init --from-example` instead for the full annotated tour
# (every section, every option) — or read docs/configuration/.

# How requests are mapped to users. `shared` (default) routes every
# request to a single hardcoded identity — perfect for trying Coulisse
# locally, but ALL memory is shared across callers. Switch to
# `per-request` for multi-user deployments: each request must then carry
# `safety_identifier` (or the deprecated `user` field) and unidentified
# requests are rejected. See docs/configuration/user-id.md.
users: shared

# Memory: sqlite for conversation history + offline `hash` embedder.
# Swap the embedder to `openai` (text-embedding-3-small) for real
# semantic recall — see docs/configuration/memory.md.
memory:
  backend:
    kind: sqlite
    path: ./.coulisse/memory.db
  embedder:
    provider: hash
    dims: 256

providers:
  openai:
    api_key: sk-replace-me

agents:
  - name: assistant
    provider: openai
    model: gpt-4o-mini
    preamble: You are a helpful assistant.
