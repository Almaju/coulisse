# yaml-language-server: $schema=./coulisse.schema.json
# Coulisse — minimal starter config.
#
# This template gets the server running with a single OpenAI agent and
# local sqlite memory. Drop in your API key and run `coulisse start`.
# Run `coulisse init --from-example` instead for the full annotated tour
# (every section, every option) — or read docs/configuration/.
#
# Generate `coulisse.schema.json` once with `coulisse schema > coulisse.schema.json`
# so your editor (yaml-language-server / VS Code YAML extension) gives you
# autocompletion and validation against the live schema.

# Fallback user identifier for requests without `safety_identifier`.
# Useful for local / single-user setups; omit for multi-tenant.
default_user_id: main

# Memory is on by default (conversation history in .coulisse/, next to
# this file — no path to configure). Add `user_state: true` to also keep
# long-term per-user facts and preferences; Coulisse picks the embedder
# and extraction model automatically from your `providers:`. The whole
# block is optional. See docs/configuration/memory.md.
memory:
  user_state: true

providers:
  openai:
    api_key: sk-replace-me

agents:
  - name: assistant
    provider: openai
    model: gpt-4o-mini
    preamble: You are a helpful assistant.
