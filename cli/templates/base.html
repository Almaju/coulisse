<html lang="en" class="dark">

        <script src="https://cdn.tailwindcss.com"></script>

        <style>

            body {
                height: 100%;
            }
            body {
                background: #020617;
                color: #e2e8f0;
                font-family:
                    ui-sans-serif,
                    system-ui,
                    -apple-system,
                    "Segoe UI",
                    Roboto,
                    "Helvetica Neue",
                    Arial,
                    sans-serif;
            }
            ::selection {
                background: #334155;

                <div class="border-t border-slate-800 px-5 py-3">

            <header

            >
                <a href="/admin/overview" class="flex items-center gap-2">
                    <span
                        class="inline-flex h-7 w-7 items-center justify-center rounded-md bg-slate-100 text-xs font-bold text-slate-900"
                        >C</span
                    >
                    <span class="text-sm font-semibold text-slate-100"
                        >Coulisse</span
                    >
                </a>
            </header>
            <main
                id="main"
                class="min-h-screen flex-1 px-8 py-8 pt-16 lg:ml-56 lg:pt-8"
            >
                {{ content|safe }}
            </main>

</html>
