<div class="space-y-6">
  <a href="/admin/settings" class="inline-flex items-center gap-1 text-sm text-slate-400 hover:text-slate-100">
    <span>←</span>
    <span>Back to settings</span>
  </a>
  <div>
    <h1 class="text-2xl font-semibold tracking-tight text-slate-100">{{ title }}</h1>
    <p class="mt-1 text-sm text-slate-400">{{ hint }}</p>
  </div>
  <form
    class="space-y-4"
    hx-put="{{ action }}"
    hx-target="#section-edit-error"
    hx-swap="innerHTML"
  >
    <div class="rounded-lg border border-slate-800 bg-slate-900">
      <div class="px-4 py-3">
        <textarea
          name="__yaml"
          rows="18"
          spellcheck="false"
          class="w-full rounded-md border border-slate-800 bg-slate-950 px-3 py-2 font-mono text-xs text-slate-200 focus:border-slate-600 focus:outline-none"
        >{{ yaml }}</textarea>
      </div>
    </div>
    <div id="section-edit-error" class="text-sm text-rose-400"></div>
    <div class="flex items-center gap-3">
      <button
        type="submit"
        class="rounded-md bg-emerald-600 px-3 py-1.5 text-sm font-medium text-white hover:bg-emerald-500"
      >
        Save
      </button>
      <a href="/admin/settings" class="text-sm text-slate-400 hover:text-slate-100">Cancel</a>
    </div>
  </form>
  <script>
    document.currentScript.previousElementSibling
      ?.querySelector?.('form')?.addEventListener('htmx:configRequest', function (e) {
        const body = (e.detail.parameters && e.detail.parameters['__yaml']) || '';
        e.detail.parameters = {};
        e.detail.headers = e.detail.headers || {};
        e.detail.headers['Content-Type'] = 'application/yaml';
        e.detail.body = body;
      });
  </script>
</div>
