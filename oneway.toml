# `cargo oneway` (https://github.com/Almaju/oneway-lints) — per-project
# rules that don't fit this codebase as written. Adding entries here is
# the right move when the rule's signal-to-noise is poor here, not when
# you just want quick green: prefer fixing the code first.

disable = [
    # `binding name should match type` — produced cascading renames whose
    # only payoff was binding-vs-type symmetry the type system already
    # gives us. Args structs added to satisfy `too_many_arguments` then
    # triggered chained `step: MigrationStep` → `migration_step:
    # MigrationStep` renames that added length without information.
    "type_derived_naming",

    # `public method calls public method` — wants every internal
    # composition extracted into a use-case struct (Service-layer
    # pattern). CLAUDE.md is explicit that data and operations belong
    # together (`url.parse()`, not `UrlParser.parse(url)`) and that the
    # codebase should NOT have `TodoController`/`TodoService` shaped
    # types. The rule pushes in the opposite direction.
    "no_self_orchestration",

    # `second primary public type in this file` — wants every public
    # type in its own file (Java-style). Idiomatic Rust groups
    # closely-related types together (error enums next to the struct
    # they describe, request/response pairs, sibling variants), and
    # CLAUDE.md does not require one-type-per-file. Splitting ~191
    # sites into ~150 new files would dilute cohesion without payoff.
    "one_public_type_per_file",
]
